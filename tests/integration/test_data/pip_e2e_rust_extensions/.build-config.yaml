environment_variables:
- name: CARGO_HOME
  value: ${output_dir}/.cargo
- name: PIP_FIND_LINKS
  value: ${output_dir}/deps/pip
- name: PIP_NO_INDEX
  value: 'true'
project_files:
- abspath: ${test_case_tmp_path}/../hermeto-output/.cargo/config.toml
  template: |2

    [source.crates-io]
    replace-with = "vendored-sources"

    [source.vendored-sources]
    directory = "${output_dir}/deps/cargo"
- abspath: ${test_case_tmp_path}/../hermeto-output/deps/pip/hello-rust-ext-gitcommit-3ffac1cedbe8c3313b06756aae585a095529d184/app/.cargo/config.toml
  template: |
    [source.crates-io]
    replace-with = "vendored-sources"

    [source."git+https://github.com/rust-random/rand?tag=0.9.0"]
    git = "https://github.com/rust-random/rand"
    tag = "0.9.0"
    replace-with = "vendored-sources"

    [source.vendored-sources]
    directory = "${output_dir}/deps/cargo"
- abspath: ${test_case_tmp_path}/../hermeto-output/deps/pip/maturin-1.8.3/maturin-1.8.3/.cargo/config.toml
  template: |
    [source.crates-io]
    replace-with = "vendored-sources"

    [source.vendored-sources]
    directory = "${output_dir}/deps/cargo"
- abspath: ${test_case_tmp_path}/requirements.txt
  template: |
    hello @ file://${output_dir}/deps/pip/hello-rust-ext-gitcommit-3ffac1cedbe8c3313b06756aae585a095529d184.tar.gz
